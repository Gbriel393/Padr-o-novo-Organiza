<head>

    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

  <nav id="sidebar">
    <ul>
      <span class="logo">Organiza</span>

      <li>
        <a href="index.html">
          <i class="fa-regular fa-house"></i>
          <span>Início</span>
        </a>
      </li>

      <li class="active">
        <a href="./novo.html">
          <i class="fa-solid fa-plus" style="color: rgb(0, 0, 0);"></i>
          <span>Cadastro</span>
        </a>
      </li>

      <li>
        <a href="./listagem.html">
          <i class="fa-solid fa-list-ul" style="color: rgb(0, 0, 0);"></i>
          <span>Listagem</span>
        </a>
      </li>

      <li>
        <a href="./operacoes.html">
          <i class="fa-solid fa-left-right" style="color: rgb(0, 0, 0);"></i>
          <span>Operações</span>
        </a>
      </li>

      <li>
        <a href="./banco.html">
          <i class="fa-solid fa-landmark" style="color: rgb(0, 0, 0);"></i>
          <span>Banco</span>
        </a>
      </li>

      <li>
        <a href="./perfil.html">
          <i class="fa-regular fa-user"></i>
          <span>Perfil</span>
        </a>
      </li>

      <li>
        <a href="./adm.html">
          <i class="fa-solid fa-users-gear" style="color: rgb(0, 0, 0);"></i>
          <span>Admin</span>
        </a>
      </li>

    </ul>



  </nav>

  <main>
    <div class="container">

      <!-- Conteúdo -->
      <main class="content">
        <div class="card">
          <h1>Novo Registro</h1>
          <p>Adicione uma nova transação</p>

          <!-- Tipo -->
          <div class="tipo">
            <button type="button" class="btn tipo-btn active">Entrada</button>
            <button type="button" class="btn tipo-btn">Saída</button>
          </div>

          <!-- Form -->
          <form id="form">
            <input type="number" placeholder="Valor" required />

            <select required>
              <option value="">Selecione uma categoria</option>
              <option>Alimentação</option>
              <option>Transporte</option>
              <option>Lazer</option>
            </select>

            <input type="date" required />

            <textarea placeholder="Descrição (opcional)"></textarea>

            <button type="submit" class="salvar">Salvar Transação</button>
          </form>
        </div>
      </main>

    </div>
  </main>


  <script src="./js/script.js"></script>
</body>

</html>
